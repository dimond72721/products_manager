<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit product</title>
</head>
<body>

<h1>Edit product</h1>

<h3>{{ name }}</h3>

<form method="POST">

    <p>Price</p>
    <input
        type="number"
        step="0.01"
        name="price"
        value="{{ product['price'] }}"
        required
    >

    <p>Category</p>
    <input
        type="text"
        name="category"
        value="{{ product['category'] }}"
        required
    >

    <br><br>

    <button type="submit">Save</button>

</form>

<br>

<a href="{{ url_for('products') }}">
    <button>Back</button>
</a>

</body>
</html>
